name: Test & Validate (Rust)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust-version: ['1.75', '1.76', '1.77']
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust ${{ matrix.rust-version }}
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ matrix.rust-version }}
        components: rustfmt, clippy
    - name: Add WASM target
      run: rustup target add wasm32-unknown-unknown wasm32-wasi
    - name: Add ARM targets
      run: rustup target add aarch64-unknown-linux-gnu thumbv7em-none-eabihf
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ matrix.rust-version }}-${{ hashFiles('**/Cargo.lock') }}
    - name: Install ROS2
      run: |
        sudo apt-get update
        sudo apt-get install -y curl gnupg2
        curl -s https://raw.githubusercontent.com/ros/rosdistro/master/ros.key | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=$(dpkg --print-architecture)] http://packages.ros.org/ros/ubuntu $(lsb_release -cs) main" > /etc/apt/sources.list.d/ros2-latest.list'
        sudo apt-get update
        sudo apt-get install -y ros-humble-ros-base
    - name: Build workspace
      run: |
        source /opt/ros/humble/setup.bash
        cargo build --workspace --all-targets --all-features
    - name: Run clippy
      continue-on-error: true
      run: |
        source /opt/ros/humble/setup.bash
        cargo clippy --workspace --all-targets --all-features -- -D warnings
    - name: Run tests
      continue-on-error: true
      run: |
        source /opt/ros/humble/setup.bash
        cargo test --workspace --all-features
    - name: Check formatting
      continue-on-error: true
      run: |
        source /opt/ros/humble/setup.bash
        cargo fmt --all -- --check
    - name: Build documentation
      continue-on-error: true
      run: |
        source /opt/ros/humble/setup.bash
        cargo doc --workspace --no-deps
